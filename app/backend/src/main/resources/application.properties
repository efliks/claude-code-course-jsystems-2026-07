spring.application.name=hsdc-backend

# Persistence (ADR-004): the DataSource itself is built in
# com.jsystems.hsdc.persistence.config.DataSourceConfig (SQLiteConfig pragmas
# for WAL + foreign_keys, Hikari pool-of-1) — HSDC_DB_PATH (default
# ./data/hsdc.db) is read directly there, so no spring.datasource.* is
# declared here (it would only be ignored once a DataSource @Bean exists).
#
# schema.sql + data.sql are idempotent and run on every start so records
# survive a restart (AC-30) without a migration tool (see ADR-004 §6).
spring.sql.init.mode=always
