spring.application.name=hsdc-backend

# Minimal datasource wiring so the JDBC starter can boot (ADR-001 skeleton scope).
# Full pooling/WAL configuration belongs to the persistence implementation (ADR-004).
spring.datasource.url=jdbc:sqlite:${HSDC_DB_PATH:./data/hsdc.db}
spring.datasource.driver-class-name=org.sqlite.JDBC
